services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: site-telas-display
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
