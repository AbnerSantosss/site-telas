version: '3.8'

services:
  # Node.js Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telahub-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
    volumes:
      # Persistent storage for B2B captured leads database
      - telahub_data:/app
    networks:
      - telahub-network

  # React Frontend served via Nginx Reverse Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telahub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - telahub-network

volumes:
  telahub_data:
    driver: local

networks:
  telahub-network:
    driver: bridge
